name: Diag AI
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install "requests[socks]"
      - name: Xray
        run: |
          curl -sL -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip xray && chmod +x xray
      - name: Run diagnostics
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
          SUB_HWID: ${{ secrets.SUB_HWID }}
        run: python diag_ai.py
